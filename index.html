<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Public+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="page-shell">
    <div class="container">
      <header class="site-header">
        <img src="img/nasa-worm-logo.png" alt="NASA logo" class="logo" />
        <div class="title-group">
          <p class="eyebrow">Astronomy Picture of the Day</p>
          <h1>Space Explorer</h1>
        </div>
      </header>

      <section class="fact-card" aria-labelledby="factHeading">
        <p id="factHeading" class="fact-label">Did You Know?</p>
        <p id="spaceFact" class="fact-text"></p>
      </section>

      <section class="controls-panel" aria-label="Date range controls">
        <div class="filters">
          <div class="input-group">
            <label for="startDate">Start date</label>
            <input type="date" id="startDate" />
          </div>

          <div class="input-group">
            <label for="endDate">End date</label>
            <input type="date" id="endDate" />
          </div>

          <button id="getImagesBtn" type="button">Get Space Images</button>
        </div>

        <p class="range-note">
          Explore NASA APOD entries from June 16, 1995 through today.
        </p>
      </section>

      <div id="statusMessage" class="status-message" aria-live="polite"></div>

      <section id="gallery" class="gallery" aria-live="polite">
        <div class="placeholder">
          <div class="placeholder-icon">🔭</div>
          <p>Select a date range and click “Get Space Images” to explore the cosmos.</p>
        </div>
      </section>
    </div>
  </div>

  <div
    id="imageModal"
    class="modal hidden"
    aria-hidden="true"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
  >
    <div class="modal-backdrop" data-close-modal="true"></div>

    <div class="modal-content">
      <button id="closeModalBtn" class="modal-close" type="button" aria-label="Close modal">
        ×
      </button>

      <div id="modalMedia" class="modal-media"></div>

      <div class="modal-copy">
        <p id="modalDate" class="modal-date"></p>
        <h2 id="modalTitle"></h2>
        <p id="modalExplanation" class="modal-explanation"></p>
        <a
          id="modalExternalLink"
          class="modal-link"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          Open original media
        </a>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
